---
- name: Enable user wide services and ensure it is not masked
  with_items: "{{ user_systemd_enabled }}"
  systemd_service:
    name: "{{ item }}" 
    enabled: true
    state: started
    masked: no
    scope: user

- name: Enable system wide services and ensure it is not masked
  become: true
  with_items: "{{ system_systemd_enabled }}"
  systemd_service:
    name: "{{ item }}" 
    enabled: true
    state: started
    masked: no
